<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loup-Garou - Narrateur Local</title>
    <link rel="stylesheet" href="visuel.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="app-container">
        <section id="screen-players" class="screen active">
            <h1 class="main-title">Lou Garou</h1>
            <div class="input-group">
                <input type="text" id="new-player-name" placeholder="Nom du joueur..." onkeypress="if(event.key === 'Enter') addPlayer()">
                <button class="btn-add" onclick="addPlayer()">+</button>
            </div>
            <div class="player-management">
                <div class="list-header">
                    <span>Joueurs (<span id="player-count">0</span>)</span>
                    <button class="btn-clear" onclick="clearAllPlayers()">Tout effacer</button>
                </div>
                <ul id="players-list-ui" class="list-scroll"></ul>
            </div>
            <button class="btn btn-primary" onclick="checkPlayers()">Passer aux rôles</button>
        </section>

        <section id="screen-roles" class="screen">
            <h2>Composition du village</h2>
            <div id="roles-config" class="list-scroll"></div>
            <div class="setup-footer">
                <p>Cartes : <strong id="role-count">0</strong> / <span id="target-count">0</span></p>
                <button class="btn btn-primary" onclick="distributeRoles()">Distribuer les rôles</button>
                <button class="btn-link" onclick="showScreen('screen-players')">Retour</button>
            </div>
        </section>

        <section id="screen-reveal" class="screen">
            <h2 id="reveal-instruction"></h2>
            <div class="reveal-container">
                <div class="card-reveal-box" onclick="toggleRoleVisibility()">
                    <div id="card-inner" class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">
                            <span id="role-emoji"></span>
                            <h3 id="role-name">Rôle</h3>
                            <p id="role-desc"></p>
                        </div>
                    </div>
                </div>
                <p class="tap-hint">Clique pour voir ta carte</p>
            </div>
            <button id="next-player-btn" class="btn btn-primary" onclick="nextPlayer()" style="display:none;">Joueur suivant</button>
        </section>

        <section id="screen-mj-transition" class="screen">
            <h1 class="main-title">MAÎTRE DU JEU</h1>
            <p class="flavor-text">Donnez l'Iphone au Maître du Jeu.</p>
            <div class="transition-icon">🎭</div>
            <button class="btn btn-primary" onclick="showMasterScreen()">Accéder au tableau de bord</button>
        </section>

        <section id="screen-master" class="screen">
            <h2>Tableau de bord</h2>
            <div id="game-summary" class="list-scroll"></div>
            <button class="btn btn-primary" onclick="confirmRestart()">Nouvelle partie</button>
        </section>

        <div id="modal-seer" class="modal">
            <div class="modal-content">
                <h2 id="modal-player-name"></h2>
                <div class="seer-card">
                    <span id="seer-emoji"></span>
                    <h3 id="seer-role"></h3>
                </div>
                <button class="btn btn-primary" onclick="closeSeerModal()">Cacher le rôle</button>
            </div>
        </div>
    </div>

    <script>
        let players = [];
        let deck = [];
        let currentRevealIndex = 0;
        let isCardVisible = false;
        let selectedCounts = {};

        const allRoles = [
            { id: 'loup', name: 'Loup-Garou', emoji: '🐺', desc: 'Dévore un villageois chaque nuit.' },
            { id: 'voyante', name: 'Voyante', emoji: '🔮', desc: 'Découvre une identité chaque nuit.' },
            { id: 'sorciere', name: 'Sorcière', emoji: '🧪', desc: 'Possède deux potions.' },
            { id: 'chasseur', name: 'Chasseur', emoji: '🏹', desc: 'Tire une balle à sa mort.' },
            { id: 'cupidon', name: 'Cupidon', emoji: '💘', desc: 'Lie deux joueurs.' },
            { id: 'villageois', name: 'Villageois', emoji: '👨‍🌾', desc: 'Cherche les loups.' }
        ];

        window.onload = () => {
            const saved = localStorage.getItem('lg_players');
            if (saved) { players = JSON.parse(saved); updatePlayersUI(); }
        };

        function addPlayer() {
            const input = document.getElementById('new-player-name');
            const name = input.value.trim();
            if (name && !players.includes(name)) {
                players.push(name);
                input.value = "";
                localStorage.setItem('lg_players', JSON.stringify(players));
                updatePlayersUI();
            }
        }

        function updatePlayersUI() {
            document.getElementById('players-list-ui').innerHTML = players.map((p, i) => `
                <li><span>${p}</span><button class="delete-btn" onclick="removeP(${i})">Supprimer</button></li>
            `).join('');
            document.getElementById('player-count').innerText = players.length;
        }

        function removeP(i) { players.splice(i, 1); localStorage.setItem('lg_players', JSON.stringify(players)); updatePlayersUI(); }
        function clearAllPlayers() { if(confirm("Effacer tous les joueurs ?")) { players = []; updatePlayersUI(); localStorage.removeItem('lg_players'); } }

        function checkPlayers() {
            if (players.length < 3) return alert("Minimum 3 joueurs.");
            showScreen('screen-roles');
            document.getElementById('target-count').innerText = players.length;
            renderRolesConfig();
        }

        function renderRolesConfig() {
            document.getElementById('roles-config').innerHTML = allRoles.map(r => `
                <div class="role-item">
                    <span>${r.emoji} ${r.name}</span>
                    <div class="counter">
                        <button onclick="changeC('${r.id}', -1)">-</button>
                        <span id="q-${r.id}">${selectedCounts[r.id] || 0}</span>
                        <button onclick="changeC('${r.id}', 1)">+</button>
                    </div>
                </div>
            `).join('');
            updateRoleCount();
        }

        function changeC(id, d) { selectedCounts[id] = Math.max(0, (selectedCounts[id] || 0) + d); document.getElementById(`q-${id}`).innerText = selectedCounts[id]; updateRoleCount(); }
        function updateRoleCount() {
            const total = Object.values(selectedCounts).reduce((a, b) => a + b, 0);
            const display = document.getElementById('role-count');
            display.innerText = total;
            display.style.color = (total === players.length) ? "#2ecc71" : "#e74c3c";
        }

        function distributeRoles() {
            const total = Object.values(selectedCounts).reduce((a, b) => a + b, 0);
            if (total !== players.length) return alert("Ajustez les rôles.");
            deck = [];
            for (let id in selectedCounts) {
                for (let i = 0; i < selectedCounts[id]; i++) {
                    const r = allRoles.find(role => role.id === id);
                    deck.push({...r, alive: true});
                }
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            currentRevealIndex = 0;
            showScreen('screen-reveal');
            prepareReveal();
        }

        function prepareReveal() {
            isCardVisible = false;
            document.getElementById('card-inner').classList.remove('flipped');
            document.getElementById('reveal-instruction').innerText = `Passe l'Iphone à : ${players[currentRevealIndex]}`;
            document.getElementById('next-player-btn').style.display = "none";
            const r = deck[currentRevealIndex];
            document.getElementById('role-emoji').innerText = r.emoji;
            document.getElementById('role-name').innerText = r.name;
            document.getElementById('role-desc').innerText = r.desc;
        }

        function toggleRoleVisibility() {
            isCardVisible = !isCardVisible;
            document.getElementById('card-inner').classList.toggle('flipped');
            if (isCardVisible) document.getElementById('next-player-btn').style.display = "block";
        }

        function nextPlayer() {
            currentRevealIndex++;
            if (currentRevealIndex < players.length) prepareReveal();
            else showScreen('screen-mj-transition');
        }

        function toggleLife(i) {
            if (confirm(`${deck[i].alive ? "Éliminer" : "Ressusciter"} ${players[i]} ?`)) {
                deck[i].alive = !deck[i].alive;
                showMasterScreen();
            }
        }

        function showSeer(i) {
            document.getElementById('modal-player-name').innerText = players[i];
            document.getElementById('seer-emoji').innerText = deck[i].emoji;
            document.getElementById('seer-role').innerText = deck[i].name;
            document.getElementById('modal-seer').style.display = "flex";
        }

        function closeSeerModal() { document.getElementById('modal-seer').style.display = "none"; }

        function showMasterScreen() {
            showScreen('screen-master');
            document.getElementById('game-summary').innerHTML = players.map((p, i) => `
                <div class="summary-item ${deck[i].alive ? '' : 'is-dead'}">
                    <div class="summary-content">
                        <strong>${p}</strong>
                        <span>${deck[i].emoji} ${deck[i].name}</span>
                    </div>
                    <div class="mj-actions">
                        <button class="btn-mj btn-life" onclick="toggleLife(${i})">${deck[i].alive ? 'Mort' : 'Vivant'}</button>
                        <button class="btn-mj btn-card" onclick="showSeer(${i})">Carte</button>
                    </div>
                </div>
            `).join('');
        }

        function confirmRestart() { if (confirm("Relancer une partie ?")) showScreen('screen-players'); }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
